name: Release Asset Uploader

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Package ZIP
        run: npm run package

      - name: Check ZIP exists
        run: test -f pgpe2e.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: pgpe2e.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}